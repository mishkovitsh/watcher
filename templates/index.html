<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../assets/style.css" />
    <script
      src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"
      integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz"
      crossorigin="anonymous"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <title>Uptima</title>

    <style>
      .header-container {
        width: 100%;
        height: 10%;

        display: flex;
        align-items: center;
        gap: 2em;
      }
      .header-container h3 {
        font-size: var(--ft-xl);
      }
      .header-container .websites-num {
        text-align: center;
        font-size: var();
      }
      .header-box {
        width: 100%;
        padding: 15px;
        background: var(--bg-sec);
        border-radius: 12px;

        display: flex;
        flex-direction: column;
        gap: 1em;
        align-items: center;
        justify-content: center;
      }
      .header-box .website-num {
        font-size: var(--ft-xl);
      }

      .website-table {
        position: relative;
        padding-top: 25px;
        margin-top: 50px;
        width: 100%;
        border-radius: 12px;
      }
      .website-table::before {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 1px;
        content: "";
        background: var(--bg-sec);
      }

      .monitor-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        margin-top: 1.5rem;
      }

      /* Naslovi iznad kartica */
      .monitor-header {
        display: grid;
        grid-template-columns: 2fr 3fr 1.2fr 0.8fr; /* Proporcije kolona */
        padding: 0 1.5rem;
        margin-bottom: 0.5rem;
        color: var(--tx-prim);
        font-size: var(--ft-md);
        text-transform: uppercase;
        font-weight: 700;
      }

      /* Pojedinačna kartica (Sexy Box) */
      .monitor-card {
        display: grid;
        grid-template-columns: 2fr 3fr 1.2fr 0.8fr; /* Isti grid kao header */
        align-items: center;
        background: var(--bg-sec);
        padding: 1rem 1.5rem;
        border-radius: 12px;
        border: 1px solid transparent; /* Border se vidi samo na hover */
        transition: var(--transition);
      }

      .monitor-card:hover {
        border-color: var(--border);
      }

      /* Elementi unutar kartice */
      .site-name {
        font-weight: 600;
        color: var(--tx-prim);
        font-size: var(--ft-base);
      }
      .site-url {
        color: var(--tx-muted);
        font-size: var(--ft-nm);
      }

      .status-badge {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-weight: 700;
        font-size: var(--ft-xs);
      }

      .status-text {
        font-weight: bold;
      }

      .add-site {
        cursor: pointer;
        position: fixed;
        bottom: 25px;
        right: 25px;
        border-radius: 50%;
        width: 55px;
        height: 55px;
        background: #fff;
      }
      .icon-plus {
        background: #000;
      }
    </style>
  </head>
  <body>
<section class="header-container">
  <p>Welcome, {{ .User }}</p>
    <div class="header-box">
        <h3>Total Websites</h3>
        <span class="website-num">{{ .Total }}</span>
    </div>
    </section>

<div class="monitor-list" id="monitor-list">
    {{ range .Websites }}
    <div class="monitor-card" id="site-{{ .ID }}">
        <span class="site-name">{{ .Name }}</span>
        <span class="site-url">{{ .URL }}</span>
        <span class="status-text" style="color: {{ if eq .Status "UP" }}var(--accent-up){{ else }}var(--accent-down){{ end }}">
            {{ .Status }}
        </span>
        <div style="text-align: right">
            <button class="delete-btn" hx-delete="/api/monitors/{{ .ID }}" hx-target="#site-{{ .ID }}" hx-swap="outerHTML">
                Delete
            </button>
        </div>
    </div>
    {{ else }}
    <p style="text-align: center; color: var(--tx-muted); padding: 20px;">Nema aktivnih monitora. Dodaj prvi!</p>
    {{ end }}
</div>

    <section class="website-table">
      <div class="monitor-header">
        <span>Name</span>
        <span>URL</span>
        <span>Status</span>
        <span style="text-align: right">Action</span>
      </div>

      <div class="monitor-list" id="monitor-list">
        <div class="monitor-card">
          <span class="site-name">{{ .Name }}</span>
          <span class="site-url">{{ .URL }}</span>
          <span class="status-text" style="color: {{ if eq .Status "UP" }}var(--accent-up){{ else }}var(--accent-down){{ end }}" style="color: var(--accent-up)">{{ .Status }}</span>
          <div style="text-align: right">
            <button
              class="delete-btn"
              hx-delete="/api/monitors/1"
              hx-target="#site-1"
              hx-swap="outerHTML">
              Delete
            </button>
          </div>
        </div>

      <div class="monitor-list" id="monitor-list">
        <div class="monitor-card">
          <span class="site-name">{{ .Name }}</span>
          <span class="site-url">{{ .URL }}</span>
          <span class="status-text" style="color: {{ if eq .Status "UP" }}var(--accent-up){{ else }}var(--accent-down){{ end }}" style="color: var(--accent-up)">{{ .Status }}</span>
          <div style="text-align: right">
            <button
              class="delete-btn"
              hx-delete="/api/monitors/1"
              hx-target="#site-1"
              hx-swap="outerHTML">
              Delete
            </button>
          </div>
        </div>

      </div>
    </section>


    <div class="add-site">
      <i data-lucide="icon-plus" class="icon-plus"></i>
    </div>



  <script>
    lucide.createIcons();
  </script>
  </body>
</html>
